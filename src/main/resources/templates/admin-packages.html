<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Packages</title>
    <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<section class="admin-layout">

    <aside class="sidebar">
        <h2>Admin Panel</h2>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/admin/packages}">Packages</a>
        <a th:href="@{/admin/reviews}">Reviews</a>
        <a th:href="@{/admin/closed-dates}">Closed Dates</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer; font:inherit; padding:0; text-decoration:underline;">Logout</button>
        </form>
    </aside>

    <main class="admin-main">
        <h1>Packages</h1>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form class="booking-form compact-form" th:action="@{/admin/packages}" th:object="${packageRequest}" method="post">
            <div>
                <input type="text" th:field="*{name}" placeholder="Package Name">
                <small class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </div>
            <div>
                <input type="text" th:field="*{description}" placeholder="Description">
            </div>
            <div>
                <input type="number" step="0.01" th:field="*{price}" placeholder="Price">
                <small class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></small>
            </div>
            <div>
                <input type="text" th:field="*{imageUrl}" placeholder="Image URL (example: /img/haircut.jpg)">
            </div>
            <button class="btn-primary" type="submit">Add Package</button>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pkg : ${packages}">
                    <td th:text="${pkg.name}">Package</td>
                    <td th:text="${pkg.description}">Description</td>
                    <td th:text="${pkg.price}">0.00</td>
                    <td>
                        <form th:action="@{'/admin/packages/' + ${pkg.id} + '/delete'}" method="post">
                            <button class="btn-small danger" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(packages)}">
                    <td colspan="4">No packages available.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</section>
</body>
</html>
