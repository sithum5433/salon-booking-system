<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings</title>
    <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<section class="admin-layout">

    <aside class="sidebar">
        <h2>Admin Panel</h2>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/admin/packages}">Packages</a>
        <a th:href="@{/admin/reviews}">Reviews</a>
        <a th:href="@{/admin/closed-dates}">Closed Dates</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer; font:inherit; padding:0; text-decoration:underline;">Logout</button>
        </form>
    </aside>

    <main class="admin-main">
        <h1>Manage Bookings</h1>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Customer</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Duration</th>
                    <th>Package</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.fullName}">Name</td>
                    <td th:text="${booking.mobileNumber}">Mobile</td>
                    <td th:text="${booking.email}">Email</td>
                    <td th:text="${booking.bookingDate}">Date</td>
                    <td th:text="${booking.startTime + ' - ' + booking.endTime}">Time</td>
                    <td th:text="${booking.durationType.label}">Duration</td>
                    <td th:text="${booking.packageItem.name}">Package</td>
                    <td th:text="${booking.status}">Status</td>
                    <td>
                        <div class="action-buttons">
                            <form th:action="@{'/admin/bookings/' + ${booking.id} + '/approve'}" method="post">
                                <button class="btn-small" type="submit">Approve</button>
                            </form>
                            <form th:action="@{'/admin/bookings/' + ${booking.id} + '/reject'}" method="post">
                                <button class="btn-small danger" type="submit">Reject</button>
                            </form>
                            <form th:action="@{'/admin/bookings/' + ${booking.id} + '/delete'}" method="post" onsubmit="return confirm('Are you sure you want to delete this booking?');">
                                <button class="btn-small danger" type="submit">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="9">No bookings available.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</section>
</body>
</html>
