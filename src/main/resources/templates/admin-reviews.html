<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews</title>
    <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<section class="admin-layout">

    <aside class="sidebar">
        <h2>Admin Panel</h2>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/admin/packages}">Packages</a>
        <a th:href="@{/admin/reviews}">Reviews</a>
        <a th:href="@{/admin/closed-dates}">Closed Dates</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer; font:inherit; padding:0; text-decoration:underline;">Logout</button>
        </form>
    </aside>

    <main class="admin-main">
        <h1>Manage Reviews</h1>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Stars</th>
                    <th>Comment</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.customerName}">Name</td>
                    <td th:text="${review.email}">Email</td>
                    <td th:text="${review.stars}">5</td>
                    <td th:text="${review.comment}">Comment</td>
                    <td th:text="${review.status}">PENDING</td>
                    <td>
                        <div class="action-buttons">
                            <form th:if="${review.status.name() == 'PENDING'}" th:action="@{'/admin/reviews/' + ${review.id} + '/approve'}" method="post">
                                <button class="btn-small" type="submit">Approve</button>
                            </form>
                            <form th:action="@{'/admin/reviews/' + ${review.id} + '/delete'}" method="post">
                                <button class="btn-small danger" type="submit">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reviews)}">
                    <td colspan="6">No reviews available.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</section>
</body>
</html>
