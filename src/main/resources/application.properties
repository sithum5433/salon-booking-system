spring.application.name=salon-booking-system
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/salon_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Colombo
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.salon.close-time=20:00
app.salon.name=KATHURA
app.timezone=Asia/Colombo
